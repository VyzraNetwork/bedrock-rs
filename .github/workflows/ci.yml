on:
  push:
    branches: main
  pull_request:

name: Continuous integration

env:
  RUSTFLAGS: "-Dwarnings"

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
  
      - uses: Swatinem/rust-cache@v2
        with:
          add-job-id-key: false
          add-rust-environment-hash-key: false
          shared-key: "bedrock-rs-cache"
          cache-on-failure: false
          cache-all-crates: true

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: actions-rs/cargo@v1
        with:
          command: test
          args: --all

  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - run: rustup component add rustfmt
      - uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

  clippy:
    name: Analyze with Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
  
      - uses: Swatinem/rust-cache@v2
        with:
          add-job-id-key: false
          add-rust-environment-hash-key: false
          shared-key: "bedrock-rs-cache"
          cache-on-failure: false
          cache-all-crates: true

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - run: rustup component add clippy
      - uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --all-targets --all-features
